name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Newer pushes to the same ref supersede in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: cargo test + browser E2E (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Deps for the headless (no-GUI) Linux build:
      #   libopus-dev    -> audiopus (else it builds Opus from vendored source and needs autotools)
      #   libasound2-dev -> cpal (ALSA)
      #   libpulse-dev   -> the pulse/psimple system-audio capture (Linux-only deps)
      # The Windows-only video deps (SVT-AV1 / libvpx / windows-capture) are cfg'd out on Linux,
      # so there is no vcpkg / VPX setup to do here.
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libopus-dev libasound2-dev libpulse-dev

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Headless build (drop the default `gui` feature): no X11/Wayland/GL stack needed, and no test
      # depends on the GUI. Covers the sync core + protocol + codec + cross-platform desktop helpers.
      - name: cargo test (workspace, headless)
        run: cargo test --workspace --no-default-features

      # Build the real server binary the browser harness boots.
      - name: Build server
        run: cargo build --release -p newfoundsync --no-default-features

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install E2E deps + Chromium
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      # playwright.config.js auto-boots ../target/release/newfoundsync
      # (--headless --insecure-http --capture web) and tears it down after.
      - name: Browser E2E (chromium)
        working-directory: e2e
        run: npx playwright test --project=chromium

      - name: Upload Playwright report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
